<!DOCTYPE html>
<html>
<head>
    <title>Fitness Zone</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(to right, #000000, #1a1a1a);
            color: white;
            text-align: center;
        }

        .hero {
            padding: 100px 20px;
            background: url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48') no-repeat center;
            background-size: cover;
        }

        .hero h1 {
            font-size: 50px;
            color: #00ff99;
        }

        .hero p {
            font-size: 20px;
        }

        .btn {
            background: #00ff99;
            color: black;
            padding: 10px 20px;
            border: none;
            margin-top: 15px;
            border-radius: 20px;
            cursor: pointer;
        }

        .section {
            padding: 40px 20px;
        }
    </style>
</head>

<body>

    <div class="hero">
        <h1>💪 Fitness Zone</h1>
        <p>Build your body. Build your life.</p>
        <button class="btn">Join Now</button>
    </div>

    <div class="section">
        <h2>Workout Plans</h2>
        <p>Beginner | Muscle Gain | Fat Loss</p>
    </div>

</body>
</html>
