<!DOCTYPE html><html lang="en">

<div class="section">
<h2>👣 Step Counter</h2>

<h1 id="steps">0</h1>

<button class="btn" onclick="addStep()">
➕ Add Step
</button>

<button class="btn" onclick="resetSteps()">
🔄 Reset
</button>
</div>

<script>
let steps = 0;

function addStep(){
    steps++;
    document.getElementById("steps").innerHTML = steps;
}

function resetSteps(){
    steps = 0;
    document.getElementById("steps").innerHTML = steps;
}
</script>
