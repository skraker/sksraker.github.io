DOCTYPE html>
<html>
<head>
    <title>Fitness Zone 💪</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(to right, #000000, #1a1a1a);
            color: white;
            text-align: center;
        }

        .hero {
            padding: 80px 20px;
            background: url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48') no-repeat center;
            background-size: cover;
        }

        .hero h1 {
            font-size: 50px;
            color: #00ff99;
        }

        .hero p {
            font-size: 20px;
        }

        .btn {
            background: #00ff99;
            color: black;
            padding: 12px 25px;
            border: none;
            font-size: 18px;
            cursor: pointer;
            border-radius: 25px;
            margin-top: 15px;
        }

        .section {
            padding: 50px 20px;
        }

        .card {
            background: #222;
            padding: 20px;
            margin: 15px;
            display: inline-block;
            width: 250px;
            border-radius: 10px;
        }

        .card h3 {
            color: #00ff99;
        }

        footer {
            background: black;
            padding: 20px;
            margin-top: 30px;
        }
    </style>
</head>

<body>

    <div class="hero">
        <h1>💪 FITNESS ZONE</h1>
        <p>Build Your Body. Build Your Life.</p>
        <button class="btn">Join Now</button>
    </div>

    <div class="section">
        <h2>🔥 Workout Plans</h2>

        <div class="card">
            <h3>Beginner</h3>
            <p>Simple home workout plan</p>
        </div>

        <div class="card">
            <h3>Muscle Gain</h3>
            <p>Gym training program</p>
        </div>

        <div class="card">
            <h3>Fat Loss</h3>
            <p>Burn fat fast workout</p>
        </div>
    </div>

    <footer>
        <p>© 2026 Fitness Zone | Stay Strong 💪</p>
    </footer>

</body>
</html>
